name: cheddar
description: A playful, modern money tracker app with personality.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.1.0

  # Database
  drift: ^2.20.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5

  # Charts
  fl_chart: ^1.1.1

  # Authentication
  local_auth: ^3.0.0

  # Notifications Reader (Android)
  notification_listener_service: ^0.3.5

  # UI & Animations
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  font_awesome_flutter: ^11.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  animated_text_kit: ^4.2.3

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  shared_preferences: ^2.3.4
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  url_launcher: ^6.3.1
  haptic_feedback: ^0.6.4+3
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3
  screenshot: ^3.0.0
  collection: ^1.19.0
  csv: ^6.0.0
  path: ^1.9.1


dependency_overrides:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  custom_lint:

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/svg/onboarding/
    - assets/svg/categories/
    - assets/svg/personalities/
    - assets/svg/empty_states/
    - assets/svg/misc/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/splash/logo.png
  android: true
  ios: true
  android_12:
    color: "#1A1A2E"
    icon_background_color: "#1A1A2E"
    image: assets/splash/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
