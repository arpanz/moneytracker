<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="invGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="coinInv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <line x1="10" y1="54" x2="54" y2="54" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="54" x2="10" y2="10" stroke="#E5E7EB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Area fill under chart -->
  <path d="M14 48 L24 40 L34 44 L44 28 L52 16 L52 54 L14 54 Z" fill="url(#invGrad)" opacity="0.15"/>
  <!-- Trend line going up -->
  <polyline points="14,48 24,40 34,44 44,28 52,16" fill="none" stroke="url(#invGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head at end -->
  <path d="M48 12 L52 16 L56 12" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-45, 52, 16)"/>
  <!-- Trend dots -->
  <circle cx="14" cy="48" r="2.5" fill="white" stroke="#22C55E" stroke-width="1.5"/>
  <circle cx="24" cy="40" r="2.5" fill="white" stroke="#22C55E" stroke-width="1.5"/>
  <circle cx="34" cy="44" r="2.5" fill="white" stroke="#22C55E" stroke-width="1.5"/>
  <circle cx="44" cy="28" r="2.5" fill="white" stroke="#22C55E" stroke-width="1.5"/>
  <!-- Coin at top -->
  <circle cx="52" cy="16" r="7" fill="url(#coinInv)" stroke="#B45309" stroke-width="1.5"/>
  <text x="52" y="20" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#92400E">$</text>
</svg>