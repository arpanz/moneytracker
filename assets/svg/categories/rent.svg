<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>
  <!-- House walls -->
  <rect x="14" y="30" width="36" height="26" rx="2" fill="url(#wallGrad)" stroke="#B45309" stroke-width="1.5"/>
  <!-- Roof -->
  <path d="M8 32 L32 10 L56 32 Z" fill="url(#roofGrad)" stroke="#78350F" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Chimney -->
  <rect x="42" y="14" width="7" height="14" rx="1" fill="#92400E" stroke="#78350F" stroke-width="1"/>
  <!-- Chimney smoke -->
  <path d="M46 14 Q48 8 44 6 Q46 2 50 4" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="18" rx="2" fill="#92400E" stroke="#78350F" stroke-width="1"/>
  <!-- Door knob -->
  <circle cx="35" cy="48" r="1.5" fill="#FCD34D"/>
  <!-- Left window -->
  <rect x="17" y="34" width="8" height="8" rx="1.5" fill="#BAE6FD" stroke="#B45309" stroke-width="1"/>
  <line x1="21" y1="34" x2="21" y2="42" stroke="#B45309" stroke-width="0.8"/>
  <line x1="17" y1="38" x2="25" y2="38" stroke="#B45309" stroke-width="0.8"/>
  <!-- Right window -->
  <rect x="39" y="34" width="8" height="8" rx="1.5" fill="#BAE6FD" stroke="#B45309" stroke-width="1"/>
  <line x1="43" y1="34" x2="43" y2="42" stroke="#B45309" stroke-width="0.8"/>
  <line x1="39" y1="38" x2="47" y2="38" stroke="#B45309" stroke-width="0.8"/>
</svg>