<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="giftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Box bottom -->
  <rect x="10" y="30" width="44" height="26" rx="3" fill="url(#giftGrad)" stroke="#991B1B" stroke-width="1.5"/>
  <!-- Box lid -->
  <rect x="8" y="24" width="48" height="10" rx="3" fill="#F87171" stroke="#991B1B" stroke-width="1.5"/>
  <!-- Vertical ribbon -->
  <rect x="29" y="24" width="6" height="32" rx="1" fill="url(#ribbonGrad)"/>
  <!-- Horizontal ribbon -->
  <rect x="8" y="27" width="48" height="5" rx="1" fill="url(#ribbonGrad)" opacity="0.8"/>
  <!-- Bow left loop -->
  <path d="M32 24 Q22 14 18 18 Q14 22 24 24" fill="#FCD34D" stroke="#D97706" stroke-width="1" stroke-linejoin="round"/>
  <!-- Bow right loop -->
  <path d="M32 24 Q42 14 46 18 Q50 22 40 24" fill="#FCD34D" stroke="#D97706" stroke-width="1" stroke-linejoin="round"/>
  <!-- Bow center knot -->
  <circle cx="32" cy="23" r="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
</svg>