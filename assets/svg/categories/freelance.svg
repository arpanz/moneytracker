<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="laptopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="screenGr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <!-- Screen -->
  <rect x="10" y="10" width="44" height="32" rx="3" fill="url(#screenGr)" stroke="#0D9488" stroke-width="2"/>
  <!-- Screen inner -->
  <rect x="13" y="13" width="38" height="26" rx="2" fill="#0F172A"/>
  <!-- Code bracket left < -->
  <path d="M24 20 L18 26 L24 32" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code bracket right > -->
  <path d="M40 20 L46 26 L40 32" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash -->
  <line x1="34" y1="18" x2="30" y2="34" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Laptop base -->
  <path d="M6 44 L10 42 L54 42 L58 44 L58 46 Q58 48 56 48 L8 48 Q6 48 6 46 Z" fill="url(#laptopGrad)" stroke="#0D9488" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Trackpad line -->
  <rect x="26" y="44" width="12" height="2" rx="1" fill="#0D9488" opacity="0.5"/>
  <!-- Cursor blink on screen -->
  <rect x="28" y="24" width="2" height="6" rx="0.5" fill="#2DD4BF" opacity="0.8"/>
</svg>