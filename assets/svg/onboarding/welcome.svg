<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cheeseBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7D94E"/>
      <stop offset="100%" stop-color="#E8A828"/>
    </linearGradient>
    <linearGradient id="bgWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE8B0"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB088" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFB088" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgWarm)"/>
  <!-- Shadow -->
  <ellipse cx="100" cy="172" rx="45" ry="8" fill="#E8A828" opacity="0.25"/>
  <!-- Body: cheese wedge triangle with rounded corners -->
  <path d="M100 40 L155 145 Q158 152 152 155 L48 155 Q42 152 45 145 Z" fill="url(#cheeseBody)" stroke="#D4941C" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cheese holes -->
  <ellipse cx="90" cy="120" rx="10" ry="8" fill="#D4941C" opacity="0.5"/>
  <ellipse cx="120" cy="105" rx="7" ry="6" fill="#D4941C" opacity="0.4"/>
  <ellipse cx="105" cy="140" rx="6" ry="5" fill="#D4941C" opacity="0.45"/>
  <!-- Eyes -->
  <ellipse cx="82" cy="90" rx="7" ry="8" fill="white"/>
  <ellipse cx="118" cy="90" rx="7" ry="8" fill="white"/>
  <ellipse cx="84" cy="91" rx="4" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="120" cy="91" rx="4" ry="4.5" fill="#2D2D2D"/>
  <!-- Eye shine -->
  <circle cx="86" cy="88" r="1.8" fill="white"/>
  <circle cx="122" cy="88" r="1.8" fill="white"/>
  <!-- Rosy cheeks -->
  <circle cx="70" cy="102" r="8" fill="url(#cheek)"/>
  <circle cx="130" cy="102" r="8" fill="url(#cheek)"/>
  <!-- Smile -->
  <path d="M88 104 Q100 118 112 104" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm waving -->
  <path d="M48 120 Q30 100 22 78 Q18 66 28 62 Q38 58 42 70 L50 95" fill="none" stroke="#E8A828" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left hand open -->
  <circle cx="25" cy="65" r="8" fill="#F7D94E" stroke="#D4941C" stroke-width="1.5"/>
  <!-- Fingers on waving hand -->
  <path d="M20 58 Q18 50 22 48" fill="none" stroke="#F7D94E" stroke-width="3" stroke-linecap="round"/>
  <path d="M25 56 Q25 48 28 46" fill="none" stroke="#F7D94E" stroke-width="3" stroke-linecap="round"/>
  <path d="M30 58 Q33 51 35 50" fill="none" stroke="#F7D94E" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm down -->
  <path d="M152 120 Q165 135 160 148" fill="none" stroke="#E8A828" stroke-width="6" stroke-linecap="round"/>
  <!-- Little legs -->
  <path d="M85 155 L80 172 Q78 178 84 178 L92 178" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M115 155 L120 172 Q122 178 116 178 L108 178" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sparkle accents -->
  <g fill="#F0C040" opacity="0.7">
    <path d="M165 45 L168 38 L171 45 L178 48 L171 51 L168 58 L165 51 L158 48 Z"/>
    <path d="M35 38 L37 33 L39 38 L44 40 L39 42 L37 47 L35 42 L30 40 Z" transform="scale(0.8) translate(5,5)"/>
  </g>
</svg>