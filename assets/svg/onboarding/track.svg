<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#3F3D9E"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5FF"/>
      <stop offset="100%" stop-color="#F0EEFF"/>
    </linearGradient>
    <linearGradient id="handGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFDBB5"/>
      <stop offset="100%" stop-color="#F0B88A"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8A828"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#F3F0FF" opacity="0.6"/>
  <!-- Hand -->
  <path d="M60 180 Q50 170 55 140 L60 110 Q62 100 72 98 L80 96 Q90 94 92 104 L92 130 Q92 140 88 150 L80 175 Q75 185 65 182 Z" fill="url(#handGrad)" stroke="#D4956A" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Thumb -->
  <path d="M60 130 Q48 125 46 115 Q44 108 52 106 Q58 105 62 112" fill="url(#handGrad)" stroke="#D4956A" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Phone body -->
  <rect x="68" y="35" width="64" height="120" rx="12" ry="12" fill="url(#phoneBg)" stroke="#2D2870" stroke-width="1.5"/>
  <!-- Phone screen -->
  <rect x="73" y="45" width="54" height="100" rx="6" ry="6" fill="url(#screenGrad)"/>
  <!-- Screen content: mini expense lines -->
  <rect x="78" y="52" width="30" height="4" rx="2" fill="#6C63FF" opacity="0.4"/>
  <rect x="78" y="62" width="44" height="3" rx="1.5" fill="#999" opacity="0.3"/>
  <rect x="78" y="70" width="38" height="3" rx="1.5" fill="#999" opacity="0.3"/>
  <rect x="78" y="78" width="42" height="3" rx="1.5" fill="#999" opacity="0.3"/>
  <!-- Mini chart bars on screen -->
  <rect x="80" y="95" width="6" height="18" rx="2" fill="#0D9488" opacity="0.6"/>
  <rect x="89" y="100" width="6" height="13" rx="2" fill="#0D9488" opacity="0.5"/>
  <rect x="98" y="88" width="6" height="25" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="107" y="93" width="6" height="20" rx="2" fill="#0D9488" opacity="0.55"/>
  <rect x="116" y="98" width="6" height="15" rx="2" fill="#0D9488" opacity="0.45"/>
  <!-- Floating coin 1 -->
  <circle cx="150" cy="45" r="14" fill="url(#coinGrad)" stroke="#B8860B" stroke-width="1.5"/>
  <text x="150" y="50" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="14" fill="#8B6914">$</text>
  <!-- Floating coin 2 (smaller) -->
  <circle cx="42" cy="55" r="10" fill="url(#coinGrad)" stroke="#B8860B" stroke-width="1" opacity="0.8"/>
  <text x="42" y="59" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#8B6914">$</text>
  <!-- Floating receipt -->
  <g transform="translate(148, 78) rotate(12)">
    <path d="M0 0 L24 0 L24 32 L21 28 L18 32 L15 28 L12 32 L9 28 L6 32 L3 28 L0 32 Z" fill="white" stroke="#CCC" stroke-width="1"/>
    <line x1="5" y1="8" x2="19" y2="8" stroke="#DDD" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="14" x2="16" y2="14" stroke="#DDD" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="19" y2="20" stroke="#DDD" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Floating cart icon -->
  <g transform="translate(28, 85)">
    <path d="M2 2 L8 2 L12 18 L28 18 L30 8 L10 8" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="14" cy="24" r="3" fill="#0D9488"/>
    <circle cx="26" cy="24" r="3" fill="#0D9488"/>
  </g>
  <!-- Sparkles -->
  <g fill="none" stroke="#6C63FF" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <path d="M160 28 L162 22 L164 28 L170 30 L164 32 L162 38 L160 32 L154 30 Z"/>
    <path d="M30 40 L31 36 L32 40 L36 41 L32 42 L31 46 L30 42 L26 41 Z"/>
  </g>
</svg>