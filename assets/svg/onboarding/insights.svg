<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="magGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#D4941C"/>
    </linearGradient>
    <linearGradient id="bgInsight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FFF4"/>
      <stop offset="100%" stop-color="#FEF9E7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgInsight)"/>
  <!-- Chart base line -->
  <line x1="30" y1="155" x2="140" y2="155" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="155" x2="30" y2="55" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <!-- Grid lines -->
  <line x1="30" y1="130" x2="140" y2="130" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="30" y1="105" x2="140" y2="105" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="30" y1="80" x2="140" y2="80" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Bar 1 -->
  <rect x="40" y="100" width="16" height="55" rx="4" fill="url(#bar1)"/>
  <!-- Bar 2 -->
  <rect x="62" y="75" width="16" height="80" rx="4" fill="url(#bar2)"/>
  <!-- Bar 3 -->
  <rect x="84" y="110" width="16" height="45" rx="4" fill="url(#bar3)"/>
  <!-- Bar 4 -->
  <rect x="106" y="65" width="16" height="90" rx="4" fill="url(#bar1)"/>
  <!-- Bar 5 -->
  <rect x="128" y="88" width="16" height="67" rx="4" fill="url(#bar2)"/>
  <!-- Trend line overlay -->
  <polyline points="48,95 70,70 92,105 114,60 136,83" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Trend dots -->
  <circle cx="48" cy="95" r="3" fill="#F59E0B"/>
  <circle cx="70" cy="70" r="3" fill="#F59E0B"/>
  <circle cx="92" cy="105" r="3" fill="#F59E0B"/>
  <circle cx="114" cy="60" r="3" fill="#F59E0B"/>
  <circle cx="136" cy="83" r="3" fill="#F59E0B"/>
  <!-- Magnifying glass -->
  <circle cx="152" cy="62" r="22" fill="none" stroke="url(#magGlass)" stroke-width="5"/>
  <circle cx="152" cy="62" r="18" fill="white" opacity="0.3"/>
  <!-- Glass handle -->
  <line x1="168" y1="78" x2="182" y2="95" stroke="#D4941C" stroke-width="6" stroke-linecap="round"/>
  <!-- Sparkle 1 -->
  <path d="M152 38 L154 30 L156 38 L164 40 L156 42 L154 50 L152 42 L144 40 Z" fill="#F0C040" opacity="0.8"/>
  <!-- Sparkle 2 -->
  <path d="M172 48 L173 44 L174 48 L178 49 L174 50 L173 54 L172 50 L168 49 Z" fill="#34D399" opacity="0.7"/>
  <!-- Sparkle 3 -->
  <path d="M22 45 L24 38 L26 45 L33 47 L26 49 L24 56 L22 49 L15 47 Z" fill="#F0C040" opacity="0.6"/>
  <!-- Small sparkle dots -->
  <circle cx="160" cy="30" r="2" fill="#F59E0B" opacity="0.6"/>
  <circle cx="175" cy="38" r="1.5" fill="#34D399" opacity="0.5"/>
  <circle cx="18" cy="60" r="2" fill="#F0C040" opacity="0.5"/>
