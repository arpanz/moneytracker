<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cheese" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7D94E"/>
      <stop offset="100%" stop-color="#E8A817"/>
    </linearGradient>
    <linearGradient id="cheeks" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFAA80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFAA80" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Body - cheese wedge -->
  <path d="M100 20 L175 160 Q175 175 160 175 L40 175 Q25 175 25 160 L100 20Z" fill="url(#cheese)" stroke="#D4940A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cheese holes -->
  <ellipse cx="80" cy="120" rx="14" ry="12" fill="#E8A817" opacity="0.5"/>
  <ellipse cx="130" cy="140" rx="10" ry="9" fill="#E8A817" opacity="0.5"/>
  <ellipse cx="105" cy="100" rx="8" ry="7" fill="#E8A817" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="78" cy="80" rx="10" ry="12" fill="white"/>
  <ellipse cx="122" cy="80" rx="10" ry="12" fill="white"/>
  <ellipse cx="80" cy="82" rx="5" ry="6" fill="#2D2D2D"/>
  <ellipse cx="124" cy="82" rx="5" ry="6" fill="#2D2D2D"/>
  <circle cx="82" cy="79" r="2" fill="white"/>
  <circle cx="126" cy="79" r="2" fill="white"/>
  <!-- Rosy cheeks -->
  <ellipse cx="60" cy="95" rx="12" ry="8" fill="url(#cheeks)"/>
  <ellipse cx="140" cy="95" rx="12" ry="8" fill="url(#cheeks)"/>
  <!-- Smile -->
  <path d="M85 100 Q100 118 115 100" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm waving -->
  <path d="M38 130 Q20 110 15 85" fill="none" stroke="#E8A817" stroke-width="6" stroke-linecap="round"/>
  <circle cx="15" cy="82" r="6" fill="#F7D94E" stroke="#E8A817" stroke-width="1.5"/>
  <!-- Right arm -->
  <path d="M162 130 Q175 120 178 108" fill="none" stroke="#E8A817" stroke-width="6" stroke-linecap="round"/>
  <circle cx="178" cy="105" r="6" fill="#F7D94E" stroke="#E8A817" stroke-width="1.5"/>
  <!-- Legs -->
  <path d="M70 175 L65 195" fill="none" stroke="#E8A817" stroke-width="6" stroke-linecap="round"/>
  <path d="M130 175 L135 195" fill="none" stroke="#E8A817" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="62" cy="196" rx="8" ry="4" fill="#D4940A"/>
  <ellipse cx="138" cy="196" rx="8" ry="4" fill="#D4940A"/>
</svg>