<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150">
  <defs>
    <linearGradient id="wallet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
  </defs>
  <!-- Wallet body -->
  <rect x="20" y="40" width="110" height="75" rx="12" fill="url(#wallet)" stroke="#4E342E" stroke-width="2"/>
  <!-- Wallet flap -->
  <path d="M20 55 Q20 40 35 40 L115 40 Q130 40 130 55 L130 62 L20 62 Z" fill="#A1887F" stroke="#4E342E" stroke-width="2" stroke-linejoin="round"/>
  <!-- Wallet clasp -->
  <circle cx="75" cy="62" r="6" fill="#FFD54F" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Sad eyes -->
  <ellipse cx="55" cy="85" rx="7" ry="8" fill="white"/>
  <ellipse cx="95" cy="85" rx="7" ry="8" fill="white"/>
  <ellipse cx="56" cy="87" rx="3.5" ry="4" fill="#2D2D2D"/>
  <ellipse cx="96" cy="87" rx="3.5" ry="4" fill="#2D2D2D"/>
  <!-- Eyebrows (sad, angled up) -->
  <path d="M45 76 Q55 72 63 76" fill="none" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
  <path d="M87 76 Q95 72 105 76" fill="none" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
  <!-- Sad mouth -->
  <path d="M62 102 Q75 94 88 102" fill="none" stroke="#4E342E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tears -->
  <path d="M48 92 Q45 102 48 112" fill="none" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <ellipse cx="48" cy="114" rx="3" ry="4" fill="#64B5F6" opacity="0.6"/>
  <path d="M102 92 Q105 104 102 115" fill="none" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <ellipse cx="102" cy="117" rx="3" ry="4" fill="#64B5F6" opacity="0.6"/>
  <!-- Small tear drops falling -->
  <ellipse cx="44" cy="125" rx="2" ry="3" fill="#64B5F6" opacity="0.4"/>
  <ellipse cx="106" cy="128" rx="2" ry="3" fill="#64B5F6" opacity="0.4"/>
</svg>