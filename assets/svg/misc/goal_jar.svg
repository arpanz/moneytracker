<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#BBDEFB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E3F2FD" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="lid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>
  </defs>
  <!-- Jar body -->
  <path d="M30 55 L30 170 Q30 185 45 185 L105 185 Q120 185 120 170 L120 55" fill="url(#glass)" stroke="#90CAF9" stroke-width="2" stroke-linejoin="round"/>
  <!-- Jar neck -->
  <rect x="40" y="35" width="70" height="20" rx="3" fill="url(#glass)" stroke="#90CAF9" stroke-width="2"/>
  <!-- Lid -->
  <rect x="35" y="25" width="80" height="14" rx="7" fill="url(#lid)" stroke="#546E7A" stroke-width="1.5"/>
  <!-- Measurement lines -->
  <line x1="33" y1="80" x2="45" y2="80" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round" stroke-dasharray="0"/>
  <line x1="33" y1="110" x2="45" y2="110" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
  <line x1="33" y1="140" x2="45" y2="140" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
  <line x1="33" y1="170" x2="45" y2="170" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
  <!-- Coins inside jar -->
  <ellipse cx="60" cy="170" rx="12" ry="5" fill="#F0C040" stroke="#D4940A" stroke-width="1"/>
  <ellipse cx="85" cy="168" rx="12" ry="5" fill="#F7D94E" stroke="#D4940A" stroke-width="1"/>
  <ellipse cx="72" cy="162" rx="12" ry="5" fill="#F0C040" stroke="#D4940A" stroke-width="1"/>
  <ellipse cx="55" cy="158" rx="10" ry="4" fill="#F7D94E" stroke="#D4940A" stroke-width="1"/>
  <ellipse cx="90" cy="160" rx="10" ry="4" fill="#F0C040" stroke="#D4940A" stroke-width="1"/>
  <!-- Sparkle -->
  <path d="M115 45 L118 38 L121 45 L128 48 L121 51 L118 58 L115 51 L108 48 Z" fill="#FFD54F" opacity="0.8"/>
  <!-- Glass shine -->
  <path d="M38 60 L38 170" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>