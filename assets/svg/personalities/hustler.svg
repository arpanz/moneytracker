<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="hustleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="cheeseH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7D94E"/>
      <stop offset="100%" stop-color="#E8A828"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="laptopH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <radialGradient id="cheekH" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB088" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB088" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="20" fill="url(#hustleBg)"/>
  <!-- Rising chart in background -->
  <path d="M30 160 L80 140 L130 150 L180 110 L230 80 L280 50" fill="none" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Chart area fill -->
  <path d="M30 160 L80 140 L130 150 L180 110 L230 80 L280 50 L280 180 L30 180 Z" fill="url(#chartGrad)"/>
  <!-- Grid lines -->
  <line x1="30" y1="100" x2="280" y2="100" stroke="#6366F1" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="140" x2="280" y2="140" stroke="#6366F1" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="60" x2="280" y2="60" stroke="#6366F1" stroke-width="0.5" opacity="0.3"/>
  <!-- Desk surface -->
  <rect x="20" y="155" width="260" height="6" rx="3" fill="#4C1D95" opacity="0.5"/>
  <!-- Laptop screen -->
  <rect x="100" y="100" width="80" height="55" rx="4" fill="url(#laptopH)" stroke="#6B7280" stroke-width="1.5"/>
  <rect x="104" y="104" width="72" height="46" rx="2" fill="#0F172A"/>
  <!-- Code on screen -->
  <rect x="108" y="108" width="30" height="3" rx="1" fill="#22D3EE" opacity="0.6"/>
  <rect x="108" y="114" width="45" height="3" rx="1" fill="#A78BFA" opacity="0.5"/>
  <rect x="108" y="120" width="35" height="3" rx="1" fill="#34D399" opacity="0.5"/>
  <rect x="112" y="126" width="40" height="3" rx="1" fill="#FCD34D" opacity="0.4"/>
  <rect x="108" y="132" width="25" height="3" rx="1" fill="#22D3EE" opacity="0.5"/>
  <rect x="108" y="138" width="50" height="3" rx="1" fill="#A78BFA" opacity="0.4"/>
  <!-- Mini chart on right side of screen -->
  <polyline points="155,142 160,135 165,138 170,128 175,120" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Laptop base -->
  <path d="M94 155 L100 155 L180 155 L186 155 L190 160 Q190 162 188 162 L92 162 Q90 162 90 160 Z" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <!-- Trackpad -->
  <rect x="130" y="156" width="20" height="3" rx="1.5" fill="#4B5563"/>
  <!-- Cheese body (sitting at desk) -->
  <path d="M62 60 L95 145 Q97 150 93 152 L31 152 Q27 150 29 145 Z" fill="url(#cheeseH)" stroke="#D4941C" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cheese holes -->
  <ellipse cx="52" cy="120" rx="6" ry="4.5" fill="#D4941C" opacity="0.4"/>
  <ellipse cx="72" cy="108" rx="5" ry="4" fill="#D4941C" opacity="0.35"/>
  <ellipse cx="58" cy="138" rx="4.5" ry="3.5" fill="#D4941C" opacity="0.4"/>
  <!-- Eyes (focused, determined) -->
  <ellipse cx="50" cy="90" rx="4.5" ry="5.5" fill="white"/>
  <ellipse cx="72" cy="90" rx="4.5" ry="5.5" fill="white"/>
  <ellipse cx="51.5" cy="91" rx="2.8" ry="3.2" fill="#2D2D2D"/>
  <ellipse cx="73.5" cy="91" rx="2.8" ry="3.2" fill="#2D2D2D"/>
  <!-- Eye glints -->
  <circle cx="53" cy="88.5" r="1.2" fill="white"/>
  <circle cx="75" cy="88.5" r="1.2" fill="white"/>
  <!-- Determined eyebrows -->
  <path d="M44 84 L56 82" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  <path d="M66 82 L78 84" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="42" cy="100" r="5" fill="url(#cheekH)"/>
  <circle cx="80" cy="100" r="5" fill="url(#cheekH)"/>
  <!-- Focused smirk -->
  <path d="M54 106 Q60 112 68 108" fill="none" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Arms reaching to laptop -->
  <path d="M93 125 Q100 120 104 125" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <path d="M31 130 Q24 140 28 148" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M50 152 L46 168 Q44 172 50 172" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M74 152 L78 168 Q80 172 74 172" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Coffee cup -->
  <g transform="translate(218, 132)">
    <rect x="0" y="0" width="18" height="22" rx="4" fill="#78350F" stroke="#92400E" stroke-width="1.2"/>
    <path d="M18 5 Q28 5 28 12 Q28 19 18 17" fill="none" stroke="#92400E" stroke-width="1.5"/>
    <!-- Coffee surface -->
    <ellipse cx="9" cy="4" rx="8" ry="3" fill="#D97706"/>
    <!-- Steam -->
    <path d="M5 -2 Q7 -10 5 -16" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <path d="M13 -2 Q11 -10 13 -16" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- Sparkle stars (golden) -->
  <path d="M250 30 L253 20 L256 30 L266 33 L256 36 L253 46 L250 36 L240 33 Z" fill="#FCD34D" opacity="0.7"/>
  <path d="M40 35 L42 28 L44 35 L51 37 L44 39 L42 46 L40 39 L33 37 Z" fill="#FCD34D" opacity="0.5"/>
  <!-- Dollar signs floating -->
  <text x="270" y="72" font-family="Arial" font-weight="bold" font-size="16" fill="#FCD34D" opacity="0.4">$</text>
  <text x="22" y="55" font-family="Arial" font-weight="bold" font-size="12" fill="#FCD34D" opacity="0.3">$</text>
</svg>