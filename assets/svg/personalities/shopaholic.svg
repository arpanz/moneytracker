<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="shopBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </linearGradient>
    <linearGradient id="cheeseS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7D94E"/>
      <stop offset="100%" stop-color="#E8A828"/>
    </linearGradient>
    <linearGradient id="bagPink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="bagPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="cheekS" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB088" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB088" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="20" fill="url(#shopBg)"/>
  <!-- Floor shadow -->
  <ellipse cx="150" cy="182" rx="80" ry="8" fill="#EC4899" opacity="0.1"/>
  <!-- Shopping bag left (on ground) -->
  <g transform="translate(50, 120)">
    <rect x="0" y="10" width="32" height="45" rx="3" fill="url(#bagPink)" stroke="#DB2777" stroke-width="1.2"/>
    <path d="M8 10 Q8 0 16 0 Q24 0 24 10" fill="none" stroke="#DB2777" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="6" y="20" width="20" height="12" rx="2" fill="white" opacity="0.3"/>
    <!-- Star on bag -->
    <path d="M16 24 L17.5 27.5 L21 28 L18.5 30.5 L19 34 L16 32 L13 34 L13.5 30.5 L11 28 L14.5 27.5 Z" fill="white" opacity="0.7"/>
  </g>
  <!-- Shopping bag right (on ground) -->
  <g transform="translate(218, 125)">
    <rect x="0" y="8" width="36" height="48" rx="3" fill="url(#bagPurple)" stroke="#9333EA" stroke-width="1.2"/>
    <path d="M8 8 Q8 -2 18 -2 Q28 -2 28 8" fill="none" stroke="#9333EA" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Heart on bag -->
    <path d="M18 22 Q18 18 14 18 Q10 18 10 22 Q10 27 18 32 Q26 27 26 22 Q26 18 22 18 Q18 18 18 22 Z" fill="white" opacity="0.6"/>
  </g>
  <!-- Small yellow bag behind character -->
  <g transform="translate(170, 130)">
    <rect x="0" y="5" width="26" height="38" rx="3" fill="#FCD34D" stroke="#D97706" stroke-width="1"/>
    <path d="M6 5 Q6 -2 13 -2 Q20 -2 20 5" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Cheese body -->
  <path d="M150 50 L200 155 Q203 162 197 164 L103 164 Q97 162 100 155 Z" fill="url(#cheeseS)" stroke="#D4941C" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cheese holes -->
  <ellipse cx="138" cy="128" rx="7" ry="5.5" fill="#D4941C" opacity="0.4"/>
  <ellipse cx="168" cy="112" rx="5.5" ry="4.5" fill="#D4941C" opacity="0.35"/>
  <ellipse cx="155" cy="148" rx="5" ry="4" fill="#D4941C" opacity="0.4"/>
  <!-- Eyes (star-struck!) -->
  <g fill="#EC4899">
    <path d="M136 92 L138 86 L140 92 L146 94 L140 96 L138 102 L136 96 L130 94 Z"/>
    <path d="M160 92 L162 86 L164 92 L170 94 L164 96 L162 102 L160 96 L154 94 Z"/>
  </g>
  <!-- Big excited smile -->
  <path d="M135 112 Q150 128 165 112" fill="#C0392B" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M138 112 Q150 123 162 112" fill="#E74C3C"/>
  <!-- Cheeks -->
  <circle cx="125" cy="106" r="7" fill="url(#cheekS)"/>
  <circle cx="175" cy="106" r="7" fill="url(#cheekS)"/>
  <!-- Left arm carrying bag -->
  <path d="M103 130 Q85 125 75 132" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M197 130 Q215 120 225 128" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M135 164 L130 178 Q128 182 134 182" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M165 164 L170 178 Q172 182 166 182" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Floating hearts -->
  <g fill="#F472B6" opacity="0.6">
    <path d="M100 40 Q100 35 96 35 Q92 35 92 40 Q92 45 100 50 Q108 45 108 40 Q108 35 104 35 Q100 35 100 40 Z" transform="scale(0.7) translate(40, 10)"/>
    <path d="M210 30 Q210 25 206 25 Q202 25 202 30 Q202 35 210 40 Q218 35 218 30 Q218 25 214 25 Q210 25 210 30 Z" transform="scale(0.6) translate(80, 25)"/>
    <path d="M260 60 Q260 55 256 55 Q252 55 252 60 Q252 65 260 70 Q268 65 268 60 Q268 55 264 55 Q260 55 260 60 Z" transform="scale(0.5) translate(150, 15)"/>
  </g>
  <!-- Sparkles -->
  <path d="M120 35 L122 28 L124 35 L131 37 L124 39 L122 46 L120 39 L113 37 Z" fill="#FCD34D" opacity="0.7"/>
  <path d="M200 42 L201 38 L202 42 L206 43 L202 44 L201 48 L200 44 L196 43 Z" fill="#EC4899" opacity="0.5"/>
</svg>