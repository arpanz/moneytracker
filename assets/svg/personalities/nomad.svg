<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="nomadBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <linearGradient id="cheeseN" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7D94E"/>
      <stop offset="100%" stop-color="#E8A828"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="cheekN" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB088" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB088" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="20" fill="url(#nomadBg)"/>
  <!-- Airplane trail in background -->
  <path d="M20 30 Q80 50 120 25 Q170 0 220 40 Q260 65 280 35" fill="none" stroke="white" stroke-width="2.5" stroke-dasharray="8 5" opacity="0.7"/>
  <!-- Tiny airplane at trail end -->
  <g transform="translate(278, 34) rotate(330)">
    <path d="M0 0 L-8 3 L-6 0 L-8 -3 Z" fill="#0EA5E9"/>
    <path d="M-4 0 L-6 5 L-5 0 L-6 -5 Z" fill="#38BDF8"/>
  </g>
  <!-- Globe on right side -->
  <circle cx="230" cy="120" r="40" fill="url(#globeGrad)" opacity="0.3" stroke="#60A5FA" stroke-width="1.5"/>
  <!-- Globe lines -->
  <ellipse cx="230" cy="120" rx="40" ry="18" fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.5"/>
  <ellipse cx="230" cy="120" rx="18" ry="40" fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="120" x2="270" y2="120" stroke="#93C5FD" stroke-width="1" opacity="0.4"/>
  <!-- Land blobs on globe -->
  <path d="M218 100 Q225 95 235 100 Q240 105 233 108 Q226 106 218 100 Z" fill="#4ADE80" opacity="0.5"/>
  <path d="M210 120 Q215 118 222 122 Q218 128 210 125 Z" fill="#4ADE80" opacity="0.4"/>
  <path d="M240 130 Q248 125 255 132 Q250 138 242 135 Z" fill="#4ADE80" opacity="0.45"/>
  <!-- Floor shadow -->
  <ellipse cx="130" cy="180" rx="55" ry="7" fill="#0D9488" opacity="0.12"/>
  <!-- Backpack on back (behind cheese) -->
  <rect x="88" y="95" width="28" height="40" rx="8" fill="#0D9488" stroke="#047857" stroke-width="1.5"/>
  <rect x="92" y="100" width="20" height="12" rx="4" fill="#14B8A6" stroke="#0D9488" stroke-width="0.8"/>
  <!-- Backpack straps -->
  <path d="M100 95 Q104 85 110 88" fill="none" stroke="#047857" stroke-width="2" stroke-linecap="round"/>
  <path d="M108 95 Q112 88 118 90" fill="none" stroke="#047857" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheese body -->
  <path d="M130 60 L175 155 Q178 162 172 164 L88 164 Q82 162 85 155 Z" fill="url(#cheeseN)" stroke="#D4941C" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cheese holes -->
  <ellipse cx="118" cy="130" rx="7" ry="5.5" fill="#D4941C" opacity="0.4"/>
  <ellipse cx="148" cy="115" rx="5.5" ry="4.5" fill="#D4941C" opacity="0.35"/>
  <ellipse cx="132" cy="148" rx="5" ry="4" fill="#D4941C" opacity="0.4"/>
  <!-- Sunglasses -->
  <rect x="114" y="88" width="14" height="10" rx="4" fill="#1E293B"/>
  <rect x="134" y="88" width="14" height="10" rx="4" fill="#1E293B"/>
  <line x1="128" y1="93" x2="134" y2="93" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>
  <line x1="114" y1="91" x2="108" y2="88" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="148" y1="91" x2="154" y2="88" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lens glare -->
  <path d="M118 90 L122 92" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M138 90 L142 92" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Smile -->
  <path d="M120 108 Q130 120 140 108" fill="none" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="110" cy="106" r="6" fill="url(#cheekN)"/>
  <circle cx="150" cy="106" r="6" fill="url(#cheekN)"/>
  <!-- Right arm pointing at globe -->
  <path d="M172 125 Q190 115 205 118" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Left arm holding backpack strap -->
  <path d="M88 125 Q78 120 76 128" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M118 164 L112 178 Q110 182 116 182" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M142 164 L148 178 Q150 182 144 182" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Floating clouds -->
  <g fill="white" opacity="0.5">
    <ellipse cx="55" cy="65" rx="18" ry="8"/>
    <ellipse cx="45" cy="60" rx="10" ry="7"/>
    <ellipse cx="65" cy="60" rx="12" ry="8"/>
  </g>
</svg>