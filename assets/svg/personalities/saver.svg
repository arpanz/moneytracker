<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="saverBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FFF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="cheeseSv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7D94E"/>
      <stop offset="100%" stop-color="#E8A828"/>
    </linearGradient>
    <linearGradient id="piggyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDA4AF"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="coinSv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="cheekSv" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB088" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB088" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="200" rx="20" fill="url(#saverBg)"/>
  <!-- Floor shadow -->
  <ellipse cx="150" cy="182" rx="75" ry="8" fill="#22C55E" opacity="0.1"/>
  <!-- Piggy bank body -->
  <ellipse cx="170" cy="138" rx="45" ry="32" fill="url(#piggyGrad)" stroke="#E11D48" stroke-width="1.5"/>
  <!-- Piggy snout -->
  <ellipse cx="212" cy="138" rx="12" ry="9" fill="#FECDD3" stroke="#F472B6" stroke-width="1.2"/>
  <!-- Piggy nostrils -->
  <circle cx="209" cy="136" r="2" fill="#E11D48" opacity="0.5"/>
  <circle cx="215" cy="136" r="2" fill="#E11D48" opacity="0.5"/>
  <!-- Piggy eye -->
  <circle cx="198" cy="126" r="3.5" fill="white"/>
  <circle cx="199" cy="126.5" r="2" fill="#2D2D2D"/>
  <circle cx="200" cy="125" r="0.8" fill="white"/>
  <!-- Piggy ear -->
  <path d="M185 110 Q180 98 190 102 Q196 106 192 114" fill="#FDA4AF" stroke="#E11D48" stroke-width="1"/>
  <!-- Piggy legs -->
  <rect x="145" y="162" width="10" height="14" rx="4" fill="#FDA4AF" stroke="#E11D48" stroke-width="1"/>
  <rect x="165" y="162" width="10" height="14" rx="4" fill="#FDA4AF" stroke="#E11D48" stroke-width="1"/>
  <rect x="185" y="162" width="10" height="14" rx="4" fill="#FDA4AF" stroke="#E11D48" stroke-width="1"/>
  <!-- Piggy coin slot -->
  <rect x="162" y="108" width="18" height="4" rx="2" fill="#E11D48" opacity="0.6"/>
  <!-- Piggy tail curl -->
  <path d="M126 130 Q118 125 120 135 Q122 142 126 138" fill="none" stroke="#E11D48" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheese body (behind/hugging piggy) -->
  <path d="M120 55 L160 148 Q162 154 158 156 L82 156 Q78 154 80 148 Z" fill="url(#cheeseSv)" stroke="#D4941C" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cheese holes -->
  <ellipse cx="108" cy="125" rx="7" ry="5" fill="#D4941C" opacity="0.4"/>
  <ellipse cx="132" cy="110" rx="5" ry="4" fill="#D4941C" opacity="0.35"/>
  <ellipse cx="115" cy="142" rx="5" ry="4" fill="#D4941C" opacity="0.4"/>
  <!-- Eyes (happy closed, content) -->
  <path d="M106 92 Q110 86 114 92" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M126 92 Q130 86 134 92" fill="none" stroke="#2D2D2D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="100" cy="100" r="6" fill="url(#cheekSv)"/>
  <circle cx="140" cy="100" r="6" fill="url(#cheekSv)"/>
  <!-- Content smile -->
  <path d="M112 106 Q120 116 128 106" fill="none" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round"/>
  <!-- Arms hugging piggy -->
  <path d="M158 120 Q175 108 185 112" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <path d="M82 125 Q70 140 78 150" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M102 156 L98 172 Q96 176 102 176" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M130 156 L134 172 Q136 176 130 176" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Floating coins -->
  <g>
    <circle cx="55" cy="50" r="12" fill="url(#coinSv)" stroke="#B45309" stroke-width="1.5"/>
    <text x="55" y="55" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="12" fill="#92400E">$</text>
  </g>
  <g opacity="0.8">
    <circle cx="85" cy="30" r="9" fill="url(#coinSv)" stroke="#B45309" stroke-width="1.2"/>
    <text x="85" y="34" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="9" fill="#92400E">$</text>
  </g>
  <g opacity="0.7">
    <circle cx="245" cy="55" r="10" fill="url(#coinSv)" stroke="#B45309" stroke-width="1.2"/>
    <text x="245" y="59" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="10" fill="#92400E">$</text>
  </g>
  <g opacity="0.6">
    <circle cx="265" cy="85" r="8" fill="url(#coinSv)" stroke="#B45309" stroke-width="1"/>
    <text x="265" y="89" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="8" fill="#92400E">$</text>
  </g>
  <!-- Sparkles -->
  <path d="M50 80 L52 74 L54 80 L60 82 L54 84 L52 90 L50 84 L44 82 Z" fill="#22C55E" opacity="0.5"/>
  <path d="M260 40 L261 36 L262 40 L266 41 L262 42 L261 46 L260 42 L256 41 Z" fill="#FCD34D" opacity="0.6"/>
</svg>