<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="foodieBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5EB"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <linearGradient id="cheeseF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7D94E"/>
      <stop offset="100%" stop-color="#E8A828"/>
    </linearGradient>
    <radialGradient id="cheekF" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB088" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB088" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="200" rx="20" fill="url(#foodieBg)"/>
  <!-- Floor shadow -->
  <ellipse cx="150" cy="180" rx="60" ry="8" fill="#E8A828" opacity="0.15"/>
  <!-- Cheese body -->
  <path d="M150 55 L195 155 Q198 162 192 164 L108 164 Q102 162 105 155 Z" fill="url(#cheeseF)" stroke="#D4941C" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cheese holes -->
  <ellipse cx="138" cy="130" rx="8" ry="6" fill="#D4941C" opacity="0.4"/>
  <ellipse cx="165" cy="115" rx="6" ry="5" fill="#D4941C" opacity="0.35"/>
  <ellipse cx="152" cy="148" rx="5" ry="4" fill="#D4941C" opacity="0.4"/>
  <!-- Chef hat -->
  <ellipse cx="150" cy="52" rx="28" ry="6" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
  <path d="M122 52 Q120 20 135 15 Q145 10 150 18 Q155 10 165 15 Q180 20 178 52" fill="white" stroke="#E5E5E5" stroke-width="1.5"/>
  <!-- Hat poof top -->
  <circle cx="140" cy="22" r="10" fill="white" stroke="#EEE" stroke-width="0.8"/>
  <circle cx="155" cy="18" r="11" fill="white" stroke="#EEE" stroke-width="0.8"/>
  <circle cx="165" cy="24" r="9" fill="white" stroke="#EEE" stroke-width="0.8"/>
  <!-- Eyes -->
  <ellipse cx="138" cy="95" rx="5" ry="6" fill="white"/>
  <ellipse cx="162" cy="95" rx="5" ry="6" fill="white"/>
  <ellipse cx="139.5" cy="96" rx="3" ry="3.5" fill="#2D2D2D"/>
  <ellipse cx="163.5" cy="96" rx="3" ry="3.5" fill="#2D2D2D"/>
  <circle cx="141" cy="93.5" r="1.5" fill="white"/>
  <circle cx="165" cy="93.5" r="1.5" fill="white"/>
  <!-- Cheeks -->
  <circle cx="128" cy="108" r="7" fill="url(#cheekF)"/>
  <circle cx="172" cy="108" r="7" fill="url(#cheekF)"/>
  <!-- Happy open mouth -->
  <path d="M140 110 Q150 122 160 110" fill="#C0392B" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M143 110 Q150 116 157 110" fill="#E74C3C"/>
  <!-- Right arm holding spatula -->
  <path d="M192 130 Q210 120 218 108" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Spatula -->
  <rect x="214" y="82" width="14" height="28" rx="5" fill="#888" stroke="#666" stroke-width="1.2"/>
  <rect x="218" y="108" width="6" height="20" rx="2" fill="#A0522D" stroke="#8B4513" stroke-width="1"/>
  <!-- Left arm -->
  <path d="M108 130 Q90 125 82 130" fill="none" stroke="#E8A828" stroke-width="5" stroke-linecap="round"/>
  <!-- Little legs -->
  <path d="M135 164 L130 178 Q128 182 134 182" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M165 164 L170 178 Q172 182 166 182" fill="none" stroke="#E8A828" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Floating pizza slice -->
  <g transform="translate(50, 45) rotate(-10)">
    <path d="M0 0 L20 30 L-20 30 Z" fill="#FCD34D" stroke="#E8A828" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="-4" cy="18" r="3" fill="#E74C3C"/>
    <circle cx="6" cy="22" r="2.5" fill="#E74C3C"/>
    <circle cx="2" cy="12" r="2" fill="#E74C3C"/>
  </g>
  <!-- Floating burger -->
  <g transform="translate(235, 40)">
    <ellipse cx="0" cy="0" rx="16" ry="6" fill="#D97706"/>
    <rect x="-14" y="0" width="28" height="6" rx="1" fill="#22C55E"/>
    <rect x="-16" y="5" width="32" height="6" rx="1" fill="#92400E"/>
    <ellipse cx="0" cy="12" rx="17" ry="6" fill="#E8A828"/>
  </g>
  <!-- Floating coffee cup -->
  <g transform="translate(72, 110)">
    <rect x="0" y="0" width="14" height="16" rx="3" fill="white" stroke="#D4941C" stroke-width="1.2"/>
    <path d="M14 4 Q22 4 22 10 Q22 16 14 14" fill="none" stroke="#D4941C" stroke-width="1.2"/>
    <!-- Steam -->
    <path d="M4 -2 Q6 -8 4 -12" fill="none" stroke="#CCC" stroke-width="1" stroke-linecap="round"/>
    <path d="M10 -2 Q8 -8 10 -12" fill="none" stroke="#CCC" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>