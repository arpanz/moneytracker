<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180">
  <defs>
    <linearGradient id="emptyBg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#CCFBF1"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" rx="16" fill="url(#emptyBg5)"/>
  <!-- Left person silhouette -->
  <g opacity="0.35">
    <!-- Head -->
    <circle cx="75" cy="60" r="20" fill="none" stroke="#5EEAD4" stroke-width="2.5" stroke-dasharray="6 4"/>
    <!-- Body -->
    <path d="M45 130 Q45 95 75 90 Q105 95 105 130" fill="none" stroke="#5EEAD4" stroke-width="2.5" stroke-dasharray="6 4" stroke-linejoin="round"/>
    <!-- Shoulders line -->
    <line x1="50" y1="100" x2="100" y2="100" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  </g>
  <!-- Right person silhouette -->
  <g opacity="0.35">
    <!-- Head -->
    <circle cx="165" cy="60" r="20" fill="none" stroke="#5EEAD4" stroke-width="2.5" stroke-dasharray="6 4"/>
    <!-- Body -->
    <path d="M135 130 Q135 95 165 90 Q195 95 195 130" fill="none" stroke="#5EEAD4" stroke-width="2.5" stroke-dasharray="6 4" stroke-linejoin="round"/>
    <!-- Shoulders line -->
    <line x1="140" y1="100" x2="190" y2="100" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  </g>
  <!-- Connection line between them (dashed) -->
  <line x1="95" y1="85" x2="135" y2="85" stroke="#99F6E4" stroke-width="2" stroke-dasharray="5 5" opacity="0.5"/>
  <!-- Question mark between them -->
  <g transform="translate(120, 85)">
    <circle cx="0" cy="0" r="16" fill="#CCFBF1" stroke="#5EEAD4" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="18" fill="#14B8A6" opacity="0.5">?</text>
  </g>
  <!-- Floating split arrows -->
  <g transform="translate(120, 40)" opacity="0.3">
    <path d="M0 0 L-12 -8" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 0 L12 -8" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round"/>
    <path d="M-9 -10 L-12 -8 L-9 -5" fill="none" stroke="#5EEAD4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9 -10 L12 -8 L9 -5" fill="none" stroke="#5EEAD4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Coin icons (faded) -->
  <circle cx="55" cy="140" r="8" fill="none" stroke="#99F6E4" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="55" y="144" text-anchor="middle" font-family="Arial" font-size="9" fill="#5EEAD4" opacity="0.3">$</text>
  <circle cx="185" cy="140" r="8" fill="none" stroke="#99F6E4" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="185" y="144" text-anchor="middle" font-family="Arial" font-size="9" fill="#5EEAD4" opacity="0.3">$</text>
  <text x="120" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#5EEAD4" opacity="0.6">No splits yet</text>
</svg>