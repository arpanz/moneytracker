<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180">
  <defs>
    <linearGradient id="emptyBg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" rx="16" fill="url(#emptyBg3)"/>
  <!-- Calendar page outline -->
  <rect x="70" y="30" width="100" height="115" rx="8" fill="none" stroke="#C4B5FD" stroke-width="2.5" stroke-dasharray="7 4"/>
  <!-- Calendar header bar -->
  <rect x="70" y="30" width="100" height="28" rx="8" fill="#C4B5FD" opacity="0.2"/>
  <rect x="70" y="50" width="100" height="8" rx="0" fill="#C4B5FD" opacity="0.2"/>
  <!-- Calendar binding rings -->
  <rect x="90" y="24" width="6" height="14" rx="3" fill="none" stroke="#A78BFA" stroke-width="2"/>
  <rect x="117" y="24" width="6" height="14" rx="3" fill="none" stroke="#A78BFA" stroke-width="2"/>
  <rect x="144" y="24" width="6" height="14" rx="3" fill="none" stroke="#A78BFA" stroke-width="2"/>
  <!-- Calendar grid dots (representing days) -->
  <g fill="#D8B4FE" opacity="0.4">
    <circle cx="88" cy="72" r="3"/>
    <circle cx="104" cy="72" r="3"/>
    <circle cx="120" cy="72" r="3"/>
    <circle cx="136" cy="72" r="3"/>
    <circle cx="152" cy="72" r="3"/>
    <circle cx="88" cy="88" r="3"/>
    <circle cx="104" cy="88" r="3"/>
    <circle cx="136" cy="88" r="3"/>
    <circle cx="152" cy="88" r="3"/>
    <circle cx="88" cy="104" r="3"/>
    <circle cx="104" cy="104" r="3"/>
    <circle cx="120" cy="104" r="3"/>
    <circle cx="136" cy="104" r="3"/>
    <circle cx="152" cy="104" r="3"/>
    <circle cx="88" cy="120" r="3"/>
    <circle cx="104" cy="120" r="3"/>
    <circle cx="120" cy="120" r="3"/>
  </g>
  <!-- Big question mark in center of calendar -->
  <text x="120" y="98" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="32" fill="#A78BFA" opacity="0.35">?</text>
  <!-- Recurring arrows icon (top right) -->
  <g transform="translate(190, 55)">
    <path d="M0 -12 A12 12 0 0 1 10 5" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M7 2 L10 5 L13 1" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <path d="M0 12 A12 12 0 0 1 -10 -5" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M-7 -2 L-10 -5 L-13 -1" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>
  <text x="120" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#A78BFA" opacity="0.7">No subscriptions tracked</text>
</svg>