<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180">
  <defs>
    <linearGradient id="emptyBg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>
  <rect width="240" height="180" rx="16" fill="url(#emptyBg2)"/>
  <!-- Jar body outline (dashed) -->
  <path d="M85 50 L85 140 Q85 152 100 152 L140 152 Q155 152 155 140 L155 50" fill="none" stroke="#86EFAC" stroke-width="2.5" stroke-dasharray="8 5" stroke-linejoin="round"/>
  <!-- Jar lid -->
  <rect x="80" y="40" width="80" height="14" rx="5" fill="none" stroke="#86EFAC" stroke-width="2.5" stroke-dasharray="6 4"/>
  <!-- Lid knob -->
  <rect x="112" y="34" width="16" height="10" rx="5" fill="none" stroke="#86EFAC" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- Dashed fill line (goal line) -->
  <line x1="90" y1="95" x2="150" y2="95" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>
  <!-- Arrow pointing to fill line -->
  <path d="M160 95 L168 95" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M165 91 L170 95 L165 99" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Measurement lines on jar side -->
  <line x1="82" y1="70" x2="86" y2="70" stroke="#A7F3D0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="95" x2="86" y2="95" stroke="#A7F3D0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="120" x2="86" y2="120" stroke="#A7F3D0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Target/bullseye icon -->
  <g transform="translate(185, 60)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#86EFAC" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#86EFAC" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#86EFAC" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#22C55E" opacity="0.5"/>
  </g>
  <!-- Sparkle hint -->
  <path d="M65 65 L67 59 L69 65 L75 67 L69 69 L67 75 L65 69 L59 67 Z" fill="#86EFAC" opacity="0.3"/>
  <text x="120" y="170" text-anchor="middle" font-family="Arial" font-size="11" fill="#6EE7B7" opacity="0.8">No goals set</text>
</svg>