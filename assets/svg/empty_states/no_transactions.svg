  <line x1="95" y1="58" x2="140" y2="58" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="95" y1="71" x2="148" y2="71" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="95" y1="84" x2="135" y2="84" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
